<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Star Iron - Team Profile</title>
<link rel="stylesheet" href="style.css">

<style>
.header-box{
display:flex;
align-items:center;
gap:20px;
padding:20px;
background:#161b22;
border-radius:10px;
}

.logo{
width:90px;
height:90px;
border-radius:10px;
background:#0d1117;
object-fit:contain;
}

.title h1{
margin:0;
color:#f0b400;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:15px;
}

.card{
background:#161b22;
padding:12px;
border-radius:8px;
}

.player{
margin-top:20px;
padding:15px;
background:#161b22;
border-radius:10px;
}
</style>

</head>

<body>

<header>
<h1>GZTV</h1>
</header>

<div class="container">

<!-- TEAM HEADER -->
<div class="header-box">
<img class="logo" src="images/star-iron.png">

<div class="title">
<h1>Star Iron</h1>
<p>China · CS2 Team</p>
</div>
</div>

<!-- TEAM STATS -->
<div class="grid">
<div class="card">World Rank<br><b>#0</b></div>
<div class="card">Rating<br><b>0.94</b></div>
<div class="card">Winrate<br><b>55%</b></div>
<div class="card">Map Pool<br><b>Dust2 Only</b></div>
<div class="card">Prize Money<br><b>$0</b></div>
<div class="card">Roster Size<br><b>1 Player</b></div>
</div>

<!-- PLAYER -->
<div class="player">

<h2>Roster</h2>

<h3>小果皂</h3>
<p>Age: 17</p>
<p>Country: China</p>

<hr>

<h4>Performance</h4>
<p>Map: Dust2</p>
<p>Games: 750</p>
<p>Rating: 0.94</p>

</div>

</div>

</body>
</html>
