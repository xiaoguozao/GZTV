<script>
let ALL_TEAMS = [];
let DATA_READY = false;

/* =========================
   📦 加载数据（强制稳定版）
========================= */
async function loadData() {
    try {
        const res = await fetch('/GZTV/data.json?t=' + Date.now())
        const data = await res.json();

        ALL_TEAMS = data.teams;
        DATA_READY = true;

        console.log("✅ DATA LOADED:", ALL_TEAMS);

        renderTeams(ALL_TEAMS);

    } catch (err) {
        console.error("❌ LOAD ERROR:", err);
    }
}

loadData();

/* =========================
   🎮 渲染
========================= */
const container = document.getElementById("team-list");

function renderTeams(list) {
    container.innerHTML = "";

    list.forEach(team => {
        const a = document.createElement("a");

        a.className = "card card-link search-item";
        a.href = "team-" + team.name.toLowerCase().replace(/ /g, "-") + ".html";

        const members = team.members.map(m => m.name).join("、");

        a.innerHTML = `
            <h3>${team.name}</h3>
            <p>${team.country} · Rating ${team.rating}</p>
            <p>${team.map} (${team.games} games)</p>
            <p>Members: ${members}</p>
        `;

        container.appendChild(a);
    });
}

/* =========================
   🔍 搜索（绝对稳定版）
========================= */
function searchTeams() {
    if (!DATA_READY) {
        console.log("⏳ 数据还没加载完");
        return;
    }

    const key = document.getElementById('search-input').value.toLowerCase();

    const result = ALL_TEAMS.filter(team =>
        team.name.toLowerCase().includes(key) ||
        team.country.toLowerCase().includes(key) ||
        team.map.toLowerCase().includes(key) ||
        team.members.some(m => m.name.toLowerCase().includes(key))
    );

    console.log("🔍 SEARCH RESULT:", result);

    renderTeams(result);
}

document.getElementById('search-btn').addEventListener('click', searchTeams);

document.getElementById('search-input').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') searchTeams();
});

/* =========================
   🎨 模式切换（保留）
========================= */
const toggleBtn = document.getElementById('mode-toggle');

if (localStorage.getItem('theme') === 'light') {
    document.body.classList.add('light-mode');
}

toggleBtn.addEventListener('click', () => {
    document.body.classList.toggle('light-mode');
    localStorage.setItem(
        'theme',
        document.body.classList.contains('light-mode') ? 'light' : 'dark'
    );
});
</script>
