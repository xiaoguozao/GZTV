<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GZTV - 战队</title>
<link rel="stylesheet" href="style.css">

<style>
.card-link {
    display: block;
    text-decoration: none;
    color: inherit;
}
.card-link:hover {
    cursor: pointer;
    background-color: #f0f0f0;
}
</style>
</head>

<body>

<header>
<h1>GZTV</h1>
<nav>
    <a href="index.html">首页</a>
    <a href="news.html">新闻</a>
    <a href="matches.html">比赛</a>
    <a href="ranking.html">排名</a>
    <a href="teams.html">战队</a>

    <input type="text" id="search-input" placeholder="搜索战队/国家/地图">
    <button id="search-btn">搜索</button>

    <button id="mode-toggle">切换颜色模式</button>
</nav>
</header>

<div class="container">
    <h2>战队列表</h2>

    <div id="team-list"></div>
</div>

<footer>
&copy; 2025 GZTV
</footer>

<script>
let DB = { teams: [] };
let ALL_TEAMS = [];

/* =========================
   📦 读取 data.json（唯一数据源）
========================= */
fetch('./data.json')
.then(res => res.json())
.then(data => {
    DB = data;
    ALL_TEAMS = data.teams;
    renderTeams(ALL_TEAMS);
});

/* =========================
   🎮 渲染系统（自动生成）
========================= */
const container = document.getElementById("team-list");

function renderTeams(list) {
    container.innerHTML = "";

    list.forEach(team => {

        const a = document.createElement("a");

        a.className = "card card-link search-item";
        a.href = "team-" + team.name.toLowerCase().replace(/ /g, "-") + ".html";

        const members = team.members.map(m => m.name).join("、");

        a.innerHTML = `
            <h3>${team.name}</h3>
            <p>🇨🇳 ${team.country} · Rating ${team.rating}</p>
            <p>Map: ${team.map} (${team.games} games)</p>
            <p>Members: ${members}</p>
        `;

        container.appendChild(a);
    });
}

/* =========================
   🔍 搜索系统（全数据搜索）
========================= */
function searchTeams() {
    const key = document.getElementById('search-input').value.toLowerCase();

    const result = ALL_TEAMS.filter(t =>
        t.name.toLowerCase().includes(key) ||
        t.country.toLowerCase().includes(key) ||
        t.map.toLowerCase().includes(key) ||
        t.members.some(m => m.name.toLowerCase().includes(key))
    );

    renderTeams(result);
}

document.getElementById('search-btn').addEventListener('click', searchTeams);

document.getElementById('search-input').addEventListener('keypress', (e) => {
    if(e.key === 'Enter') searchTeams();
});

/* =========================
   🎨 模式切换
========================= */
const toggleBtn = document.getElementById('mode-toggle');

if(localStorage.getItem('theme') === 'light'){
    document.body.classList.add('light-mode');
}

toggleBtn.addEventListener('click', () => {
    document.body.classList.toggle('light-mode');
    localStorage.setItem(
        'theme',
        document.body.classList.contains('light-mode') ? 'light' : 'dark'
    );
});
</script>

</body>
</html>
