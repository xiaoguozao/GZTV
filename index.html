<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电竞资讯网站 - 首页</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>GZTV</h1>
        <nav>
            <a href="index.html">首页</a>
            <a href="news.html">新闻</a>
            <a href="matches.html">比赛</a>
            <a href="ranking.html">排名</a>
            <!-- 搜索框 -->
            <input type="text" id="search-input" placeholder="搜索新闻/比赛/战队">
            <button id="search-btn">搜索</button>
            <!-- 模式切换按钮 -->
            <button id="mode-toggle">切换颜色模式</button>
        </nav>
    </header>

    <div class="container">
        <h2>欢迎来到GZTV！</h2>
        <p>这里你可以查看最新新闻、比赛信息和战队排名。</p>

        <!-- 可搜索内容 -->
        <div class="card search-item">
            <h3>战队A夺冠！</h3>
            <p>战队A战胜所有对手，夺得冠军。</p>
        </div>
        <div class="card search-item">
            <h3>新赛事开赛</h3>
            <p>全球电竞锦标赛即将开赛，各大战队已报名。</p>
        </div>
        <div class="card search-item">
            <h3>战队B获得积分榜第一</h3>
            <p>战队B在最近比赛中表现出色，积分第一。</p>
        </div>
    </div>

    <footer>
        &copy; 2025 GZTV
    </footer>

    <script>
        // 模式切换
        const toggleBtn = document.getElementById('mode-toggle');
        if(localStorage.getItem('theme') === 'light'){
            document.body.classList.add('light-mode');
        }
        toggleBtn.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
        });

        // 搜索跳转功能
        const searchBtn = document.getElementById('search-btn');
        const searchInput = document.getElementById('search-input');

        function doSearch() {
            const keyword = searchInput.value.trim();
            if(keyword){
                // 跳转到 search.html 并传递关键字
                window.location.href = `search.html?query=${encodeURIComponent(keyword)}`;
            }
        }

        // 点击搜索按钮
        searchBtn.addEventListener('click', doSearch);

        // 回车搜索
        searchInput.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') doSearch();
        });
    </script>
</body>
</html>
